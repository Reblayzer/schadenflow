services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schadenflow
      POSTGRES_USER: schadenflow
      POSTGRES_PASSWORD: schadenflow
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schadenflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/schadenflow
      SPRING_DATASOURCE_USERNAME: schadenflow
      SPRING_DATASOURCE_PASSWORD: schadenflow
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-dev-only-insecure-secret-change-me-0123456789}
      SCHADENFLOW_TRIAGE_PROVIDER: ${SCHADENFLOW_TRIAGE_PROVIDER:-mock}
      SCHADENFLOW_TRIAGE_MODEL: ${SCHADENFLOW_TRIAGE_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db-data:
